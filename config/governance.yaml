# Tool Governance & RBAC Configuration

# List of tools that require Human-In-The-Loop (HITL) approval regardless of role
# These tools will trigger an interrupt in the graph if a user approval mechanism is set.
dangerous_tools:
  - run_bash
  - write_file
  - edit_file
  - delete_file
  - sandbox_bash
  - git_commit
  - git_create_pr
  - docker_stop
  - docker_exec
  - docker_compose_up
  - docker_compose_down

# Role-Based Access Control (RBAC)
# Define which roles can access which categories of tools.
# If a role is not listed here, it gets 'base_tools' only.
role_permissions:
  ProductManager:
    - base_tools
    - web_search
    - fetch_url
    - browser_open
    - browser_screenshot
    - notify_macos
    - notify_say
  Architect:
    - base_tools
    - read_file
    - web_search
    - use_skill
    - browser_open
    - browser_screenshot
    - git_status
    - git_diff
    - git_log
  Coder:
    - base_tools
    - read_file
    - write_file
    - edit_file
    - run_bash
    - sandbox_bash
    - use_skill
    # 视觉感知
    - computer_screenshot
    - screenshot_region
    - ocr_screen
    - screen_record
    - mouse_move
    - mouse_click
    - mouse_double_click
    - mouse_drag
    - mouse_scroll
    - key_type
    - key_combo
    # Git
    - git_status
    - git_diff
    - git_log
    - git_blame
    - git_commit
    - git_create_branch
    - git_create_pr
    # Docker
    - docker_ps
    - docker_logs
    - docker_exec
    - docker_start
    - docker_stop
    - docker_compose_up
    - docker_compose_down
    - docker_images
    # 数据库
    - db_connect
    - db_query
    - db_schema
    - db_explain
    # 通知
    - notify_macos
    - notify_say
  QA_Reviewer:
    - base_tools
    - read_file
    - run_bash
    - sandbox_bash
    - web_search
    - use_skill
    # 视觉感知
    - computer_screenshot
    - screenshot_region
    - ocr_screen
    - screen_record
    - mouse_move
    - mouse_click
    - mouse_double_click
    - mouse_drag
    - mouse_scroll
    - key_type
    - key_combo
    # 浏览器
    - browser_open
    - browser_screenshot
    - browser_click
    - browser_type
    - browser_scroll
    # Git
    - git_status
    - git_diff
    - git_log
    - git_blame
    # Docker
    - docker_ps
    - docker_logs
    # 数据库
    - db_connect
    - db_query
    - db_schema
    - db_explain
    # 通知
    - notify_macos
    - notify_email
    - notify_webhook
    - notify_say

# Sandbox Enforcement Settings
sandbox_settings:
  # If true, tools like run_bash and edit_file will be forced into Docker
  force_docker_sandbox: true
  # Map tools to their sandboxed versions (internal logic)
  sandboxed_tools:
    run_bash: sandbox_bash
    # edit_file: sandbox_edit (to be implemented)
  # Default image for sandboxing
  default_image: "python:3.11-slim"
